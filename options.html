<!DOCTYPE html>
<html>
<head>
  <title>YouTube Summarizer Settings</title>
  <style>
    body { font-family: 'Roboto', 'Arial', sans-serif; padding: 20px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input[type="password"] { width: 300px; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background-color: #0056b3; }
    #status { margin-top: 10px; color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h1>YouTube Transcript Summarizer Settings</h1>
  <p>Enter your OpenRouter API key below. This key will be stored securely in your browser's extension storage.</p>
  <label for="apiKey">OpenRouter API Key:</label>
  <input type="password" id="apiKey" name="apiKey">
  <button id="saveButton">Save Settings</button>
  <p id="status"></p>
  <script src="options.js"></script>
</body>
</html>
